<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit & Fine Trend Delivery & Return Policy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            text-align: center;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 50px 20px;
        }
        
        .logo {
            font-size: 44px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }
        
        .logo .black {
            color: #000000;
        }
        
        .logo .gold {
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .main-title {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-top: 10px;
            line-height: 1.4;
        }
        
        .content {
            padding: 50px 30px;
        }
        
        .subtitle {
            color: #555;
            font-size: 18px;
            margin-bottom: 40px;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .policy-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 25px;
            background: white;
            border: 2px solid #2a5298;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            color: #2a5298;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(42,82,152,0.1);
        }
        
        .policy-btn:hover {
            background: #2a5298;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(42,82,152,0.3);
        }
        
        .policy-btn .icon {
            font-size: 24px;
        }
        
        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 40px 0;
        }
        
        .contact-info {
            color: #666;
            font-size: 15px;
        }
        
        .contact-info a {
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer {
            padding: 20px;
            background: #f8f9fa;
            color: #888;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .logo { font-size: 36px; }
            .main-title { font-size: 24px; }
            .content { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo">
                <span class="black">Fit & Fine</span> 
                <span class="gold">Trend</span>
            </h1>
            <h2 class="main-title">Delivery & Return Policy</h2>
        </div>
        
        <div class="content">
            <p class="subtitle">আমাদের সার্ভিস সম্পর্কে বিস্তারিত জানুন</p>
            
            <div class="button-group">
                <a href="Delevery policy.html" class="policy-btn">
                    <span class="icon">📦</span>
                    <span>ডেলিভারি পলিসি দেখুন</span>
                </a>
                
                <a href="Return-policy.html" class="policy-btn">
                    <span class="icon">🔄</span>
                    <span>রিটার্ন & এক্সচেঞ্জ পলিসি</span>
                </a>
            </div>
            
            <div class="divider"></div>
            
            <div class="contact-info">
                <p>যেকোনো প্রশ্নে যোগাযোগ করুন</p>
                <p><a href="https://wa.me/8801841378185">WhatsApp: 01841378185</a></p>
            </div>
        </div>
        
        <div class="footer">
            © 2026 Fit & Fine Trend. আপনার আস্থাই আমাদের শক্তি।
        </div>
    </div>
    
    <script>
        // বাটন ক্লিক অ্যানিমেশন
        document.querySelectorAll('.policy-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                this.style.transform = 'scale(0.96)';
                setTimeout(() => { this.style.transform = 'scale(1)'; }, 150);
            });
        });
    </script>
</body>
</html>
